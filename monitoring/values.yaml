prometheus:
  enabled: true
  prometheusSpec:
    externalUrl: https://traefik.mykubernetes.com/prometheus  # Do patch
    routePrefix: /prometheus  # Do patch
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path  # Padrão do k3s
          resources:
            requests:
              storage: 2Gi
    readinessProbe:
      failureThreshold: 5
      periodSeconds: 15
    alerting:
      alertmanagers:
      - apiVersion: v2
        namespace: monitoring
        name: my-kube-prometheus-stack-alertmanager
        port: http-web
        pathPrefix: /alertmanager

alertmanager:
  enabled: true
  alertmanagerSpec:
    externalUrl: https://traefik.mykubernetes.com/alertmanager  # Do patch
    routePrefix: /alertmanager  # Do patch
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          resources:
            requests:
              storage: 1Gi

grafana:
  enabled: true
  # prometheus-stack nao e gerenciado pelo Helm — estas configuracoes NAO sao aplicadas automaticamente.
  # Para aplicar, patch manual no ConfigMap:
  #   kubectl get configmap prometheus-stack-grafana -n monitoring -o json | \
  #     python3 -c "..." | kubectl apply -f -
  # Ver README.md para o comando completo.
  grafana.ini:
    server:
      domain: traefik.mykubernetes.com
      root_url: https://traefik.mykubernetes.com/grafana  # URL absoluta — relativo (/grafana) nao funciona
      serve_from_sub_path: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
