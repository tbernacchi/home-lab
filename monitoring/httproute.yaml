---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: monitoring-routes
  namespace: monitoring
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
      sectionName: websecure
  hostnames:
    - traefik.mykubernetes.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /prometheus
      backendRefs:
        - name: my-kube-prometheus-stack-prometheus
          port: 9090
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: my-kube-prometheus-stack-grafana
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /alertmanager
      backendRefs:
        - name: my-kube-prometheus-stack-alertmanager
          port: 9093
