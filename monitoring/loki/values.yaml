deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 168h  # 7 days
  compactor:
    retention_enabled: true
    delete_request_store: filesystem

singleBinary:
  replicas: 1
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  persistence:
    enabled: true
    storageClass: local-path
    size: 10Gi

# Disable microservice components (single-binary mode)
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable built-in monitoring (using kube-prometheus-stack)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
  dashboards:
    enabled: false

# Direct service access — no gateway needed
gateway:
  enabled: false

# Disable memcached caches — unnecessary in homelab
chunksCache:
  enabled: false
resultsCache:
  enabled: false
