metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    buckets: "0.1,0.3,1.2,5.0"
    service:
      enabled: true
    serviceMonitor:
      enabled: false

logs:
  general:
    level: INFO
  access:
    enabled: true
    fields:
      general:
        defaultmode: keep
      headers:
        defaultmode: drop
        names:
          X-Real-IP: keep
          X-Forwarded-For: keep
          CF-Connecting-IP: keep
          CF-IPCountry: keep
          CF-IPCity: keep
          CF-Region: keep
          CF-Latitude: keep
          CF-Longitude: keep

tracing:
  otlp:
    enabled: true
    http:
      enabled: true
      endpoint: http://tempo.monitoring.svc:4318/v1/traces

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    allowEmptyServices: true
  kubernetesGateway:
    enabled: true

gatewayClass:
  enabled: true
  name: traefik

gateway:
  enabled: true
  name: traefik-gateway
  namespace: traefik
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All
