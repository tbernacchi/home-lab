dashboard:
  enabled: true
  domain: "traefik.mykubernetes.com"

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    buckets: "0.100000, 0.300000, 1.200000, 5.000000"
    service:
      enabled: true
    serviceMonitor:
      enabled: false

logs:
  access:
    enabled: true
    fields:
      defaultMode: keep
      headers:
        defaultMode: drop
        names:
          X-Real-IP: keep
          X-Forwarded-For: keep
          CF-Connecting-IP: keep
          CF-IPCountry: keep
          CF-IPCity: keep
          CF-Region: keep
          CF-Latitude: keep
          CF-Longitude: keep

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: true
  kubernetesIngress:
    enabled: true
    allowEmptyServices: true
  kubernetesGateway:
    enabled: true

gatewayClass:
  enabled: true
  name: traefik

gateway:
  enabled: true
  name: traefik-gateway
  namespace: traefik
  listeners:
    web:
      port: 80
      protocol: HTTP
      namespacePolicy:
        from: All

additionalArguments:
  - "--api.dashboard=true"
  - "--api.insecure=false"
  - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
  - "--log.level=DEBUG"
  - "--serversTransport.insecureSkipVerify=false"
  - "--tracing.otlp=true"
  - "--tracing.otlp.http=true"
  - "--tracing.otlp.http.endpoint=http://tempo.monitoring.svc:4318/v1/traces"

globalArguments:
  - "--global.checknewversion=false"
  - "--global.sendanonymoususage=false"
