# ICA Domain: Securing Workloads â€” Authorization
# Deny-all baseline + allow only productpageâ†’reviews + ingressâ†’productpage.
# Apply:   kubectl apply -f 04-authz-policy.yaml
# Verify:  curl http://localhost:8080/productpage  â†’ 200 (allowed via ingress policy)
#          kubectl exec <reviews-pod> -- curl http://ratings:9080/ratings/1 â†’ 403 (blocked)
# Reset:   kubectl delete -f 04-authz-policy.yaml
---
# Deny everything in the mesh by default
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: deny-all
  namespace: default
spec: {}
---
# Allow ingress gateway â†’ productpage on GET /productpage*
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-ingress-productpage
  namespace: default
spec:
  selector:
    matchLabels:
      app: productpage
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
      to:
        - operation:
            methods: ["GET"]
            paths: ["/productpage*", "/static*", "/login", "/logout", "/api/v1/products*"]
---
# Allow productpage â†’ details
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-productpage-details
  namespace: default
spec:
  selector:
    matchLabels:
      app: details
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/bookinfo-productpage"
---
# Allow productpage â†’ reviews
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-productpage-reviews
  namespace: default
spec:
  selector:
    matchLabels:
      app: reviews
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/bookinfo-productpage"
---
# Allow reviews â†’ ratings
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-reviews-ratings
  namespace: default
spec:
  selector:
    matchLabels:
      app: ratings
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/default/sa/bookinfo-reviews"
