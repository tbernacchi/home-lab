# ICA Domain: Traffic Management — Egress via ServiceEntry
# By default Istio blocks unknown external traffic (outboundTrafficPolicy: REGISTRY_ONLY in demo profile).
# This ServiceEntry allows pods to reach httpbin.org on port 80/443.
# Apply:   kubectl apply -f 06-egress-serviceentry.yaml
# Test:    kubectl exec <any-pod> -c <container> -- curl -s http://httpbin.org/get
# Block:   kubectl delete -f 06-egress-serviceentry.yaml
#          kubectl exec <any-pod> -- curl -s http://httpbin.org/get  → 502
---
apiVersion: networking.istio.io/v1
kind: ServiceEntry
metadata:
  name: httpbin-ext
  namespace: default
spec:
  hosts:
    - httpbin.org
  ports:
    - number: 80
      name: http
      protocol: HTTP
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
# Route all httpbin.org traffic through egress gateway
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: httpbin-ext
  namespace: default
spec:
  hosts:
    - httpbin.org
  http:
    - timeout: 3s
      route:
        - destination:
            host: httpbin.org
            port:
              number: 80
