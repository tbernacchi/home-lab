---
- name: Install chrony
  ansible.builtin.apt:
    name: chrony
    state: present
    update_cache: true

- name: Stop and disable systemd-timesyncd
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: stopped
    enabled: false
    masked: true
  ignore_errors: true

- name: Deploy chrony.conf
  ansible.builtin.copy:
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      pool ntp.ubuntu.com        iburst maxsources 4
      pool 0.ubuntu.pool.ntp.org iburst maxsources 1
      pool 1.ubuntu.pool.ntp.org iburst maxsources 1

      sourcedir /run/chrony-dhcp
      sourcedir /etc/chrony/sources.d

      keyfile /etc/chrony/chrony.keys
      driftfile /var/lib/chrony/chrony.drift

      logdir /var/log/chrony

      maxupdateskew 100.0

      # Step clock only if offset > 1s, and only for first 3 updates.
      # After that, slew only — prevents Prometheus out-of-bounds drops.
      makestep 1 3

      # Sync hardware clock if present (no-op on RPi without RTC)
      rtcsync
  notify: Restart chrony

- name: Enable and start chrony
  ansible.builtin.systemd:
    name: chrony
    state: started
    enabled: true

- name: Force NTP sync
  ansible.builtin.command: chronyc makestep
  changed_when: true

- name: Wait for chrony to sync (max 30s, offset < 100ms)
  ansible.builtin.command: chronyc waitsync 30 0.1 0 1
  changed_when: false
  register: chrony_sync
  failed_when: chrony_sync.rc != 0

- name: Show tracking info
  ansible.builtin.command: chronyc tracking
  register: chrony_tracking
  changed_when: false

- name: Print tracking
  ansible.builtin.debug:
    msg: "{{ chrony_tracking.stdout_lines }}"
